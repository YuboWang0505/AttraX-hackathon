<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <!-- simple-peer's randombytes dep reads `global.crypto` at module-top
         level. Vite's define + nodePolyfills doesn't always rewrite this in
         the pre-bundled output. Inject a runtime alias before any module
         script so the bare `global` identifier resolves to the window. -->
    <script>window.global = window;</script>
    <title>EchoPlay</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
